{% extends "base.html" %}

{% load i18n %}

{% block title %}{% trans "Set Password" %}{% endblock %}

{% block content %}
<h1>{% trans "Set Password" %}</h1>

<form method="POST" action="{% url 'account_set_password' %}">
    {% csrf_token %}
    <table>
        {{ form.as_table }}
    </table>
    <input type="submit" name="action" value="{% trans 'Set Password' %}" />
</form>
{% endblock %}
